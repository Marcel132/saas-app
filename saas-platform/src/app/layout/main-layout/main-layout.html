@if(isMobile()) {
  <button class="mobile-menu-btn" (click)="toogleSidebar()">
    <img src="/icons/menu.svg" alt="Menu">
  </button>
}

@if(isMobile() && !isSidebarCollapsed()) {
  <div class="backdrop" (click)="toogleSidebar()"></div>
}

<div class="wrapper" [class.collapsed]="isSidebarCollapsed()">

  <nav class="side-bar">

    @for(item of navItems(); track item.route){
      <a class="nav-link"
        [routerLink]='[baseRoute(), item.route]'
        routerLinkActive='active'
      >
        {{item.label}}
      </a>
    }

    <a class="nav-link"
       routerLink="/"
       (click)="logout()">
      Wyloguj się
    </a>

  </nav>

  <div class="content">

    <nav class="top-bar">
      @if(!isMobile()){
      <button class="button" (click)="toogleSidebar()">
        <img src="/icons/menu.svg" alt="Menu">
      </button>
      }
      @if(!isMobile()) {
        <div class="search">
          <input type="text" placeholder="Szukaj...">
          <img src="/icons/magnify.svg" alt="Search">
        </div>
      }
      @else {
        <div></div>
      }

      <div class="user-menu">
        @if(isMobile()) {
          <img src="/icons/account.svg" alt="Account">
        }
        @else {
          <img src="/icons/account.svg" alt="Account">
          <span>{{ displayName() }}, Witamy</span>
        }
      </div>

    </nav>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

    <footer class="footer">
      footer
    </footer>

  </div>

</div>

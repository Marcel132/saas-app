<div class="wrapper">
  @if(isLoading()){
    <div class="app-message loading">
      Ładowanie...
    </div>
  }
  @else if(contract()) {

    <h4>Edytuj kontrakt</h4>

    <form [formGroup]="form" class="card" (ngSubmit)="update()">

      <label for='title'>Tytuł</label>
      <input
        class="app-input title"
        formControlName="title"
        id='title'
      >

      <label for='description'>Opis</label>
      <textarea
        class="app-input description"
        formControlName="description"
        id='description'
        (keydown.enter)="onEnter($event)"
        >
      </textarea>

      <label for='price'>Cena</label>
      <input
        class="app-input price"
        type="number"
        formControlName="price"
        id='price'
      >

      <label for='deadline'>Deadline</label>
      <input
        class='app-input deadline'
        type="string"
        id="deadline"
        formControlName='newDeadline'
      >
      <button
      type='submit'
        class="app-button save">
        Zapisz zmiany
      </button>


    </form>

    <app-message [request]="request()"></app-message>

  } @else {

    <div class="app-message error">
      Nie znaleziono kontraktu. <br> Spróbuj ponownie lub skontaktuj się z administratorem
    </div>

  }
</div>

<div class="wrapper">
  <div class="header">
    <div class="left-header">
      <h4>Moje Kontrakty:</h4>
      <div class="badges">
        <ui-badge variant='open' text="Open ({{counter().open.toString()}})"/>
        <ui-badge variant='in-progress' text="In Progress ({{counter().inProgress.toString()}})"/>
        <ui-badge variant='completed' text="Completed ({{counter().completed.toString()}})"/>
        <ui-badge variant='cancelled' text="Cancelled ({{counter().cancelled.toString()}})"/>
      </div>
    </div>
    <button class="app-button btn-add" routerLink="add">
      + Nowy Kontrakt
    </button>
  </div>
  <div class="cards">
    @if(contracts().length <= 0){
      <h5>Nie masz tutaj żadnych kontraków <br> Dodaj swój pierwszy kontrakt</h5>
    } @else {
      @for(contract of contracts(); track contract.contractId){
        <app-contract-card
        [contractId]='contract.contractId'
        [title]='contract.title'
        [description]='contract.description'
        [price]='contract.pricePerRequest'
        [deadline]='contract.deadline'
        [route]='`${contract.contractId}/applications`'
        [status]='contract.contractStatus',
        (editClicked)="openEditPage($event)"
        (deleteClicked)="deleteMethod($event)"
      >
      </app-contract-card>
      }
    }
  </div>
  <div class="page-info">
    <span>Strona</span>

    @for(page of pages(); track page){
      <button
        [class.active]="page === currentPage()"
        (click)="loadOfferByPage(page)"
      >
        {{ page }}
      </button>
    }
  </div>
</div>

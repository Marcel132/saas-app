<div class="wrapper">
  <h3>Formularz Logowania</h3>
  <form
[formGroup]="form"
class='app-card'
(ngSubmit)='login()'
>

  <input
  type="email"
  formControlName="email"
  placeholder='Email'
  class='app-input'
  >
  <input
   type="password"
   formControlName="password"
   placeholder='Hasło'
   class='app-input'
  >

  <button
  type="submit"
  class='app-button'
  >
    Zaloguj się
  </button>

  @if(request().state === 'loading') {
    <div class="app-message loading">
      {{request().message}}
    </div>
  }

  @if(request().state === 'error'){
    <div class="app-message error">
      {{request().message}}
    </div>
  }

  @if (request().state === 'success') {
    <div class="app-message success">
      {{request().message}}
    </div>
  }
</form>

</div>

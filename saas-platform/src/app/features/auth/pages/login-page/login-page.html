<div class="wrapper">
  <h3>Formularz Logowania</h3>
  <form
  [formGroup]="form"
  class='app-card'
  (ngSubmit)='login()'
  >

    <input
    type="email"
    formControlName="email"
    placeholder='Email'
    class='app-input'
    >
    <input
    type="password"
    formControlName="password"
    placeholder='Hasło'
    class='app-input'
    >

    <button
    type="submit"
    class='app-button'
    >
      Zaloguj się
    </button>
  </form>

  <app-message [request]="request()"></app-message>

  <a [routerLink]="'/auth/register'">Nie masz konta? Zarejestruj się</a>

</div>
